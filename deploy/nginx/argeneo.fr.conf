# =============================================================================
# Argeneo — nginx server block
# Install:  sudo cp deploy/nginx/argeneo.fr.conf /etc/nginx/conf.d/argeneo.fr.conf
#           sudo nginx -t && sudo systemctl reload nginx
#
# Serves the React/Vite build (SPA) and reverse-proxies /api to the Spring Boot
# backend on 127.0.0.1:8080. TLS is added by certbot (see commented block + the
# README "TLS" section). No Docker — the backend is a native systemd service.
# =============================================================================

# --- gzip (compress text assets; images/fonts are already compressed) -------
gzip              on;
gzip_comp_level   5;
gzip_min_length   256;
gzip_proxied      any;
gzip_vary         on;
gzip_types        text/plain text/css text/javascript application/javascript
                  application/json application/xml application/rss+xml
                  image/svg+xml font/woff2;

server {
    listen      80;
    listen      [::]:80;
    server_name argeneo.fr www.argeneo.fr;

    # ---------------------------------------------------------------------
    # BEFORE TLS: certbot needs this path to answer the ACME HTTP-01 challenge.
    # Keep it reachable over plain HTTP even after you add the redirect below.
    # ---------------------------------------------------------------------
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # ---------------------------------------------------------------------
    # AFTER you run certbot (`certbot --nginx`), it will normally inject the
    # 443 server block and an HTTP->HTTPS redirect automatically. If you manage
    # TLS by hand instead, uncomment the redirect below and the 443 block,
    # then comment out the SPA + /api locations in THIS http server.
    # ---------------------------------------------------------------------
    # return 301 https://$host$request_uri;

    # --- Static SPA -------------------------------------------------------
    root  /opt/argeneo/frontend;
    index index.html;

    # Long-cache fingerprinted Vite assets; never cache the HTML shell.
    location /assets/ {
        access_log off;
        expires    30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: unknown routes return index.html so the React router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API reverse proxy ------------------------------------------------
    location /api {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # WebSocket / SSE upgrade support (harmless if unused).
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # --- Security headers --------------------------------------------------
    # HSTS is intentionally omitted here; certbot/HTTPS block is the right place
    # for it (uncomment in the 443 block once TLS is live).
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-Frame-Options        "SAMEORIGIN"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection        "0"             always;

    # --- Uploads ----------------------------------------------------------
    # Room for future file uploads through /api. Raise if you accept big files.
    client_max_body_size 25m;

    access_log /var/log/nginx/argeneo.access.log;
    error_log  /var/log/nginx/argeneo.error.log;
}

