spring:
  application:
    name: argeneo-backend

  # Upload de fichiers (photos d'articles, logo, images IA) : la valeur par défaut (1 Mo) est trop
  # basse — une photo de téléphone dépasse. Le front réduit déjà les images avant l'envoi IA ; ces
  # limites larges sont un filet de sécurité (dépassement = 413 clair, plus de 401 trompeur).
  # request-size > file-size pour couvrir les envois multi-photos (compose « menu »).
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 40MB

  datasource:
    url: jdbc:postgresql://localhost:5432/argeneo
    username: argeneo
    password: argeneo_local_dev

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway possède le schéma ; JPA ne fait que valider le mapping
    open-in-view: false         # pas d'OSIV : transactions explicites, mapping multi-tenant net
    properties:
      hibernate.format_sql: true
      # Isolation multi-tenant automatique : Hibernate filtre/stampe @TenantId
      # via ce resolver (instancié par Hibernate, lit le TenantContext statique).
      hibernate.tenant_identifier_resolver: net.argeneo.tenant.TenantIdentifierResolver

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info

# --- Configuration applicative Argeneo ---
argeneo:
  security:
    jwt:
      # Secret de DEV uniquement. En prod : surcharger via ARGENEO_SECURITY_JWT_SECRET (>= 32 octets).
      secret: ${ARGENEO_SECURITY_JWT_SECRET:dev-secret-change-me-please-argeneo-local-0123456789}
      expiration-minutes: 720
    cors:
      allowed-origins: http://localhost:5173
  # Super-admin amorcé au démarrage s'il n'existe pas (DEV).
  bootstrap:
    super-admin:
      enabled: true
      email: "${ARGENEO_BOOTSTRAP_ADMIN_EMAIL:alexkhan.yog@icloud.com}"
      password: "${ARGENEO_BOOTSTRAP_ADMIN_PASSWORD:Argénéo90251@}"
      full-name: Super Admin
  # Stockage des fichiers uploadés (photos d'articles). Dossier créé au démarrage s'il manque.
  uploads:
    dir: "${ARGENEO_UPLOADS_DIR:./uploads}"
  # Vertex AI (Gemini) — avis de tendance. Chemin vide => fonctionnalité désactivée proprement.
  gemini:
    service-account-path: "${ARGENEO_GEMINI_SA_PATH:}"
    project: "${ARGENEO_GEMINI_PROJECT:lec-sin-test-ai}"
    location: "${ARGENEO_GEMINI_LOCATION:us-central1}"
    model: "${ARGENEO_GEMINI_MODEL:gemini-2.5-flash}"
    image-model: "${ARGENEO_GEMINI_IMAGE_MODEL:imagen-3.0-generate-002}"
    image-edit-model: "${ARGENEO_GEMINI_IMAGE_EDIT_MODEL:gemini-2.5-flash-image}"

logging:
  level:
    org.hibernate.SQL: info
